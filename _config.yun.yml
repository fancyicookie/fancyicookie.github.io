    link: https://space.bilibili.com/18482345
    icon: ri:bilibili-line
    color: '#FF8EB3'
  - name: GitHub
    link: https://github.com/fancyicookie
    icon: ri:github-line
    color: '#181717'
  - name: 知乎
    link: https://www.zhihu.com/
    icon: ri:zhihu-line
    color: '#0084FF'
  - name: 网易云音乐
    link: https://music.163.com/#/user/home?id=484011502
    icon: ri:netease-cloud-music-line
    color: '#C10D0C'
  - name: E-Mail
    link: mailto:fly72109@163.com
    icon: ri:mail-line
    color: '#8E71C1'
   

pages:
  - name: 网站主题
    url: https://github.com/YunYouJun/hexo-theme-yun
    icon: ri:genderless-line
    color: dodgerblue
  - name: 我的网站
    url: https://juejin.cn/user/189539693105495
    icon: ri:women-line
